<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="theme-color" content="#0a0a0a">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Meet Prep">
<title>Meet Prep — Jun 27</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0a0a;--surface:#141414;--card:#1c1c1c;--card2:#242424;--border:#2a2a2a;--accent:#c8ff00;--accent-dim:rgba(200,255,0,0.1);--red:#ff4d4d;--green:#00c96e;--muted:#555;--sub:#888;--text:#efefef}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;overflow-x:hidden}
.view{display:none}.view.active{display:block}
#toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--card2);border:1px solid var(--border);color:var(--text);padding:10px 20px;border-radius:999px;font-size:.82rem;font-weight:600;z-index:999;opacity:0;transition:all .25s;pointer-events:none;white-space:nowrap}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.confetti-piece{position:fixed;width:8px;height:8px;border-radius:2px;pointer-events:none;z-index:998;animation:confettiFall 1.2s ease-in forwards}
@keyframes confettiFall{0%{transform:translateY(-10px) rotate(0deg);opacity:1}100%{transform:translateY(100vh) rotate(720deg);opacity:0}}
.swipe-wrap{position:relative;overflow:hidden}
.day-content.slide-left{transform:translateX(-60px);opacity:0}
.day-content.slide-right{transform:translateX(60px);opacity:0}
.swipe-hint{display:flex;justify-content:space-between;padding:6px 16px 0;font-size:.65rem;color:var(--muted)}
.app-header{position:sticky;top:0;z-index:100;background:rgba(10,10,10,0.96);backdrop-filter:blur(14px);border-bottom:1px solid var(--border);padding:13px 16px 10px;display:flex;align-items:center;justify-content:space-between;gap:8px;transition:transform .25s}
.app-header.hidden{transform:translateY(-100%)}
.app-header h1{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:3px;color:var(--accent);white-space:nowrap}
.hdr-btns{display:flex;gap:6px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.hdr-btn{background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--sub);padding:5px 10px;font-size:0.78rem;font-family:'DM Sans',sans-serif;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.hdr-btn:hover{background:var(--card2);color:var(--accent);border-color:var(--accent)}
.maxes-strip{display:flex;gap:8px;padding:10px 16px;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;scrollbar-width:none;align-items:center}
.maxes-strip::-webkit-scrollbar{display:none}
.max-pill{flex-shrink:0;background:var(--card);border:1px solid var(--border);border-radius:10px;padding:7px 14px;text-align:center;cursor:pointer;transition:border-color .15s}
.max-pill:hover{border-color:var(--accent)}
.max-pill .lbl{font-size:.62rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
.max-pill .kg{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;color:var(--accent);line-height:1}
.edit-max-pill{flex-shrink:0;background:transparent;border:1px dashed var(--border);border-radius:10px;padding:7px 12px;color:var(--muted);font-size:.75rem;cursor:pointer;transition:all .15s}
.edit-max-pill:hover{border-color:var(--accent);color:var(--accent)}
.meet-pill{flex-shrink:0;background:rgba(255,77,77,.08);border:1px solid rgba(255,77,77,.25);border-radius:10px;padding:7px 14px;text-align:center}
.meet-pill .lbl{font-size:.62rem;text-transform:uppercase;letter-spacing:1px;color:rgba(255,77,77,.6)}
.meet-pill .kg{font-family:'Bebas Neue',sans-serif;font-size:1rem;color:#ff6b6b;line-height:1}
.selectors-wrap{background:var(--surface);border-bottom:1px solid var(--border);padding:10px 16px 12px}
.week-row{display:flex;gap:6px;align-items:center;overflow-x:auto;scrollbar-width:none;padding-bottom:8px}
.week-row::-webkit-scrollbar{display:none}
.row-lbl{font-size:.62rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);flex-shrink:0;margin-right:2px}
.week-btn{flex-shrink:0;width:32px;height:32px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--sub);font-family:'DM Sans',sans-serif;font-size:.8rem;font-weight:600;cursor:pointer;transition:all .15s;position:relative}
.week-btn.active{background:var(--accent);color:#000;border-color:var(--accent)}
.week-btn.has-data::after{content:'';position:absolute;top:3px;right:3px;width:5px;height:5px;border-radius:50%;background:var(--green)}
.week-btn.deload-btn{border-color:rgba(255,77,77,.3);color:#ff6b6b}
.week-btn.deload-btn.active{background:#ff6b6b;color:#000;border-color:#ff6b6b}
.block-label-row{display:flex;gap:4px;padding:0 0 2px 44px;font-size:.55rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted)}
.day-row{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;align-items:center}
.day-row::-webkit-scrollbar{display:none}
.day-tab{flex-shrink:0;padding:6px 15px;border-radius:999px;border:1px solid var(--border);background:transparent;color:var(--sub);font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;position:relative}
.day-tab.active{background:var(--accent);color:#000;border-color:var(--accent)}
.day-tab.done-day::after{content:'✓';position:absolute;top:-5px;right:-5px;width:14px;height:14px;background:var(--green);color:#000;border-radius:50%;font-size:.55rem;display:flex;align-items:center;justify-content:center;font-weight:700}
.day-content{padding:0 12px 110px}
.section-label{font-size:.62rem;letter-spacing:2px;text-transform:uppercase;color:var(--muted);padding:16px 4px 6px}
.ex-card{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:10px;overflow:hidden;transition:border-color .2s;animation:fadeUp .18s ease both}
.ex-card.main-lift{border-color:rgba(200,255,0,.18);background:linear-gradient(135deg,#131200,var(--card))}
.ex-card.fully-done{border-color:var(--green)!important}
.ex-header{display:flex;align-items:center;gap:10px;padding:12px 14px;cursor:pointer;user-select:none}
.ex-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:.75rem;transition:all .15s;cursor:pointer}
.fully-done .ex-check{background:var(--green);border-color:var(--green);color:#000}
.ex-info{flex:1;min-width:0}
.ex-name-row{display:flex;align-items:baseline;gap:7px;flex-wrap:wrap}
.ex-name{font-size:.95rem;font-weight:600}
.ex-var{font-size:.72rem;color:var(--sub)}
.ex-badge{font-size:.58rem;border-radius:5px;padding:1px 7px;font-weight:700;letter-spacing:.5px;white-space:nowrap}
.badge-main{background:var(--accent-dim);color:var(--accent);border:1px solid rgba(200,255,0,.25)}
.badge-acc{background:rgba(255,255,255,.04);color:var(--muted);border:1px solid var(--border)}
.badge-rpe{background:rgba(200,255,0,.15);color:var(--accent);border:1px solid rgba(200,255,0,.4);font-size:.58rem;border-radius:5px;padding:1px 7px;font-weight:700;letter-spacing:.5px;white-space:nowrap}
.badge-rpe.rpe-peak{background:rgba(255,77,77,.15);color:#ff6b6b;border:1px solid rgba(255,77,77,.4)}
.ex-summary{font-size:.72rem;color:var(--sub);margin-top:2px}
.ex-chevron{color:var(--muted);font-size:.8rem;flex-shrink:0;transition:transform .2s}
.ex-card.open .ex-chevron{transform:rotate(180deg)}
.ex-body{display:none;border-top:1px solid var(--border);padding:12px 14px}
.ex-card.open .ex-body{display:block}
.rpe-target-bar{display:flex;align-items:center;gap:8px;background:var(--surface);border:1px solid rgba(200,255,0,.2);border-radius:8px;padding:8px 12px;margin-bottom:10px}
.rpe-target-bar.rpe-peak-bar{border-color:rgba(255,77,77,.3);background:rgba(255,77,77,.05)}
.rpe-target-label{font-size:.6rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted)}
.rpe-target-val{font-family:'Bebas Neue',sans-serif;font-size:1.3rem;color:var(--accent);line-height:1}
.rpe-target-bar.rpe-peak-bar .rpe-target-val{color:#ff6b6b}
.rpe-target-desc{font-size:.68rem;color:var(--sub);margin-left:auto}
.suggested-bar{display:flex;align-items:center;gap:8px;background:rgba(200,255,0,.04);border:1px dashed rgba(200,255,0,.15);border-radius:8px;padding:6px 12px;margin-bottom:10px}
.suggested-bar .s-label{font-size:.6rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted)}
.suggested-bar .s-val{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:var(--sub);line-height:1}
.suggested-bar .s-note{font-size:.65rem;color:var(--muted);margin-left:auto;font-style:italic}
.sets-header{display:grid;grid-template-columns:22px 1fr 1fr 34px 22px;gap:6px;margin-bottom:6px}
.sets-header span{font-size:.6rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);text-align:center}
.set-row{display:grid;grid-template-columns:22px 1fr 1fr 34px 22px;gap:6px;align-items:center;margin-bottom:6px}
.set-num{font-size:.72rem;color:var(--muted);font-weight:600;text-align:center}
.set-inp{background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:600;padding:7px 6px;outline:none;transition:border-color .15s;width:100%;text-align:center}
.set-inp:focus{border-color:var(--accent)}
.set-inp::placeholder{color:var(--muted);font-weight:400;font-size:.72rem}
.tick-btn{width:34px;height:34px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:.85rem;transition:all .15s;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.tick-btn.done{background:var(--green);border-color:var(--green);color:#000}
.del-set-btn{width:22px;height:22px;border-radius:5px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:.7rem;display:flex;align-items:center;justify-content:center;padding:0;transition:color .15s}
.del-set-btn:hover{color:var(--red)}
.add-set-btn{width:100%;padding:7px;border-radius:8px;border:1px dashed var(--border);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.78rem;cursor:pointer;transition:all .15s;margin-top:4px}
.add-set-btn:hover{border-color:var(--accent);color:var(--accent)}
.notes-ta{width:100%;margin-top:10px;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.82rem;padding:8px 10px;outline:none;resize:none;transition:border-color .15s}
.notes-ta:focus{border-color:var(--accent)}
.notes-ta::placeholder{color:var(--muted)}
.complete-btn{display:block;width:calc(100% - 24px);margin:12px 12px 0;padding:14px;border-radius:12px;border:none;background:var(--accent);color:#000;font-family:'Bebas Neue',sans-serif;font-size:1.2rem;letter-spacing:2px;cursor:pointer;transition:all .15s}
.complete-btn.done{background:var(--green)}
.rest-screen{text-align:center;padding:60px 20px 20px}
.rest-screen .ri{font-size:3rem;margin-bottom:12px}
.rest-screen h2{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:2px;color:var(--sub)}
.rest-screen p{font-size:.82rem;color:var(--muted);margin-top:6px}
#tableView{padding-bottom:60px}
.tbl-wrap{overflow-x:auto;padding:16px}
.prog-table{border-collapse:collapse;width:100%;min-width:1100px;font-size:.8rem}
.prog-table th{background:var(--surface);border:1px solid var(--border);padding:8px 10px;font-size:.62rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted);white-space:nowrap;font-weight:600}
.prog-table td{border:1px solid var(--border);padding:7px 10px;vertical-align:top}
.prog-table tr:hover td{background:rgba(255,255,255,.02)}
.ex-cell{color:var(--text);font-weight:600}
.day-head-row td{background:var(--card2)!important;color:var(--accent);font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:2px;padding:8px 12px}
.tbl-set-row{display:flex;gap:4px;align-items:center;margin-bottom:3px}
.tbl-inp{background:var(--surface);border:1px solid transparent;border-radius:4px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.75rem;font-weight:600;padding:2px 4px;width:50px;text-align:center;outline:none;transition:border-color .15s}
.tbl-inp:focus{border-color:var(--accent)}
.tbl-inp.ri{width:40px}
.tbl-x{font-size:.65rem;color:var(--muted)}
.tbl-tick{width:18px;height:18px;border-radius:4px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:.6rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;padding:0;transition:all .12s;line-height:1}
.tbl-tick.done{background:var(--green);border-color:var(--green);color:#000}
.tbl-del{width:14px;height:14px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:.6rem;padding:0;line-height:1;display:flex;align-items:center;justify-content:center;transition:color .12s;flex-shrink:0}
.tbl-del:hover{color:var(--red)}
.tbl-add{font-size:.62rem;color:var(--muted);background:transparent;border:1px dashed var(--border);border-radius:4px;padding:2px 7px;cursor:pointer;margin-top:3px;font-family:'DM Sans',sans-serif;transition:all .15s;display:block;width:100%}
.tbl-add:hover{border-color:var(--accent);color:var(--accent)}
.tbl-suggested{font-size:.58rem;color:var(--muted);font-style:italic;margin-bottom:3px}
.tbl-export-btn{margin:0 16px 12px;padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--sub);font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .15s}
.tbl-export-btn:hover{border-color:var(--accent);color:var(--accent)}
#progressView{padding-bottom:80px}
.prog-inner{padding:0 16px}
.prog-view-tab{padding:8px 20px;border-radius:999px;border:1px solid var(--border);background:transparent;color:var(--sub);font-family:'DM Sans',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .15s}
.prog-view-tab.active{background:var(--accent);color:#000;border-color:var(--accent)}
.prog-ex-btn{flex-shrink:0;padding:5px 12px;border-radius:999px;border:1px solid var(--border);background:transparent;color:var(--sub);font-family:'DM Sans',sans-serif;font-size:.72rem;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap}
.prog-ex-btn.active{background:var(--card2);color:var(--text);border-color:var(--sub)}
.maxes-board{display:flex;flex-direction:column;gap:6px;padding-bottom:20px}
.max-row{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 14px;display:flex;align-items:center;justify-content:space-between;cursor:pointer;transition:border-color .15s}
.max-row:hover{border-color:var(--accent)}
.max-row.has-data{border-color:rgba(200,255,0,.2)}
.max-row-left{flex:1;min-width:0}
.max-row-name{font-size:.9rem;font-weight:600;color:var(--text)}
.max-row-day{font-size:.65rem;color:var(--muted);margin-top:1px;text-transform:uppercase;letter-spacing:.8px}
.max-row-right{text-align:right;flex-shrink:0;margin-left:12px}
.max-row-weight{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;color:var(--accent);line-height:1}
.max-row-reps{font-size:.7rem;color:var(--sub);margin-top:1px}
.max-row-empty{font-size:.8rem;color:var(--muted)}
.chart-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:14px}
.chart-title{font-size:.65rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:10px}
.chart-area{width:100%;height:120px}
.chart-area svg{width:100%;height:100%}
.prog-entry{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 14px;display:flex;justify-content:space-between;align-items:center}
.pe-wk{font-size:.65rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
.pe-val{font-family:'Bebas Neue',sans-serif;font-size:1.3rem}
.pe-reps{font-size:.72rem;color:var(--sub);margin-top:1px}
.delta{font-size:.75rem;font-weight:600}
.delta.up{color:var(--green)}.delta.dn{color:var(--red)}.delta.eq{color:var(--muted)}
#editView{padding-bottom:80px}
.edit-inner{padding:0 16px}
.edit-head{padding:20px 0 4px}
.edit-head h2{font-family:'Bebas Neue',sans-serif;font-size:1.6rem;letter-spacing:2px;color:var(--accent)}
.edit-head p{font-size:.75rem;color:var(--sub);margin-bottom:14px}
.edit-day-picker{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:14px}
.edit-day-btn{padding:6px 14px;border-radius:999px;border:1px solid var(--border);background:transparent;color:var(--sub);font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .15s}
.edit-day-btn.active{background:var(--card2);color:var(--text);border-color:var(--sub)}
.edit-list{display:flex;flex-direction:column;gap:8px}
.edit-row{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:10px 12px;display:grid;gap:6px}
.edit-top{display:flex;gap:8px;align-items:center}
.edit-inp{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:.85rem;font-weight:600;padding:7px 10px;outline:none;transition:border-color .15s}
.edit-inp:focus{border-color:var(--accent)}
.edit-inp::placeholder{color:var(--muted);font-weight:400}
.type-sel{background:var(--surface);border:1px solid var(--border);border-radius:8px;color:var(--sub);font-family:'DM Sans',sans-serif;font-size:.75rem;padding:7px 8px;outline:none}
.del-btn{width:30px;height:30px;border-radius:7px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:1rem;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.del-btn:hover{background:rgba(255,77,77,.15);border-color:var(--red);color:var(--red)}
.add-ex-btn{width:100%;padding:10px;border-radius:10px;border:1px dashed var(--border);background:transparent;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.82rem;cursor:pointer;margin-top:4px;transition:all .15s}
.add-ex-btn:hover{border-color:var(--accent);color:var(--accent)}
.data-section{padding:16px;margin-top:4px;border-top:1px solid var(--border)}
.data-section h4{font-size:.65rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:8px}
.data-note{font-size:.72rem;color:var(--muted);line-height:1.6;margin-bottom:10px;background:var(--card);border:1px solid var(--border);border-radius:8px;padding:10px 12px}
.data-btns{display:flex;gap:8px;flex-wrap:wrap}
.data-btn{padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:var(--card);color:var(--sub);font-family:'DM Sans',sans-serif;font-size:.78rem;font-weight:600;cursor:pointer;transition:all .15s}
.data-btn:hover{border-color:var(--accent);color:var(--accent)}
.data-btn.danger:hover{border-color:var(--red);color:var(--red)}
.modal-ov{display:none;position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:200;align-items:center;justify-content:center;padding:20px}
.modal-ov.open{display:flex}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:18px;padding:22px;width:100%;max-width:340px}
.modal h3{font-family:'Bebas Neue',sans-serif;font-size:1.4rem;letter-spacing:2px;color:var(--accent);margin-bottom:14px}
.mf{display:flex;flex-direction:column;gap:4px;margin-bottom:12px}
.mf label{font-size:.65rem;text-transform:uppercase;letter-spacing:1px;color:var(--muted)}
.mf input{background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'DM Sans',sans-serif;font-size:1rem;font-weight:600;padding:9px 12px;outline:none;transition:border-color .15s}
.mf input:focus{border-color:var(--accent)}
.modal-acts{display:flex;gap:8px;margin-top:16px}
.btn-p{flex:1;padding:11px;border-radius:10px;border:none;background:var(--accent);color:#000;font-family:'DM Sans',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer}
.btn-s{padding:11px 18px;border-radius:10px;border:1px solid var(--border);background:transparent;color:var(--sub);font-family:'DM Sans',sans-serif;font-size:.9rem;cursor:pointer}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;background:rgba(10,10,10,.97);backdrop-filter:blur(12px);border-top:1px solid var(--border);display:flex;padding:8px 0 max(8px,env(safe-area-inset-bottom));transition:transform .25s}
.bottom-nav.hidden{transform:translateY(100%)}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;padding:5px 0;background:transparent;border:none;color:var(--muted);font-family:'DM Sans',sans-serif;font-size:.58rem;font-weight:600;text-transform:uppercase;letter-spacing:.8px;cursor:pointer;transition:color .15s}
.nav-btn .ni{font-size:1.1rem}
.nav-btn.active{color:var(--accent)}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.countdown-strip{background:rgba(255,77,77,.06);border-bottom:1px solid rgba(255,77,77,.15);padding:6px 16px;text-align:center;font-size:.7rem;color:#ff6b6b;letter-spacing:.5px}
.countdown-strip strong{font-family:'Bebas Neue',sans-serif;font-size:1rem;letter-spacing:1px}
</style>
</head>
<body>
<div id="toast"></div>

<!-- TRAIN VIEW -->
<div id="mainView" class="view active">
  <div class="app-header" id="mainHeader">
    <h1>MEET PREP</h1>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px">
      <div class="hdr-btns">
        <button class="hdr-btn" onclick="openView('tableView')">&#128203; Table</button>
        <button class="hdr-btn" onclick="openView('progressView')">&#128200; Progress</button>
        <button class="hdr-btn" onclick="openView('editView')">&#9998; Edit</button>
      </div>
    </div>
  </div>
  <div class="countdown-strip" id="countdown"></div>
  <div class="maxes-strip" id="maxesStrip"></div>
  <div class="selectors-wrap">
    <div class="week-row">
      <span class="row-lbl">Week</span>
      <div id="weekBtns" style="display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;align-items:center"></div>
    </div>
    <div class="block-label-row" id="blockLabelRow"></div>
    <div style="height:8px"></div>
    <div class="day-row" id="dayTabs"></div>
  </div>
  <div class="swipe-hint"><span id="swipeLeft"></span><span id="swipeRight"></span></div>
  <div class="swipe-wrap" id="swipeWrap">
    <div class="day-content" id="dayContent"></div>
  </div>
</div>

<!-- TABLE VIEW -->
<div id="tableView" class="view">
  <div class="app-header">
    <h1>PROGRAM TABLE</h1>
    <div class="hdr-btns"><button class="hdr-btn" onclick="openView('mainView')">&#10005; Close</button></div>
  </div>
  <button class="tbl-export-btn" onclick="exportCSV()">&#11015; Export CSV</button>
  <div class="tbl-wrap" id="tableWrap"></div>
</div>

<!-- PROGRESS VIEW -->
<div id="progressView" class="view">
  <div class="app-header">
    <h1>PROGRESS</h1>
    <div class="hdr-btns"><button class="hdr-btn" onclick="openView('mainView')">&#10005; Close</button></div>
  </div>
  <div class="prog-inner">
    <div style="display:flex;gap:8px;margin:14px 0 16px">
      <button class="prog-view-tab active" id="pvtLog" onclick="setProgView('log')">&#127942; Maxes</button>
      <button class="prog-view-tab" id="pvtGraph" onclick="setProgView('graph')">&#128200; Graph</button>
    </div>
    <div id="progLogTab"><div id="progLogContent"></div></div>
    <div id="progGraphTab" style="display:none">
      <div style="font-size:.65rem;text-transform:uppercase;letter-spacing:1.5px;color:var(--muted);margin-bottom:10px">Select exercise</div>
      <div id="progGraphPicker" style="display:flex;gap:6px;flex-wrap:wrap;margin-bottom:16px"></div>
      <div class="chart-card">
        <div class="chart-title" id="graphTitle">Select an exercise</div>
        <div class="chart-area" id="mainChart"></div>
      </div>
      <div id="progGraphLog" style="display:flex;flex-direction:column;gap:8px;margin-top:4px"></div>
    </div>
  </div>
</div>

<!-- EDIT VIEW -->
<div id="editView" class="view">
  <div class="app-header">
    <h1>EDIT PROGRAM</h1>
    <div class="hdr-btns"><button class="hdr-btn" onclick="openView('mainView')">&#10005; Close</button></div>
  </div>
  <div class="edit-inner">
    <div class="edit-head">
      <h2>Edit program</h2>
      <p>Changes apply across all weeks. Block 1 (3wk) + Block 2 (4wk) + Block 3 (4wk) + Deload</p>
    </div>
    <div class="edit-day-picker" id="editDayPicker"></div>
    <div class="edit-list" id="editList"></div>
    <button class="add-ex-btn" onclick="addExercise()">+ Add exercise</button>
  </div>
  <div class="data-section">
    <h4>Data</h4>
    <div class="data-btns">
      <button class="data-btn" onclick="exportData()">Export JSON</button>
      <button class="data-btn" onclick="document.getElementById('importFile').click()">Import JSON</button>
      <button class="data-btn danger" onclick="clearAllData()">Clear all logs</button>
    </div>
    <input type="file" id="importFile" accept=".json" style="display:none" onchange="importData(event)">
  </div>
</div>

<!-- MAXES MODAL -->
<div class="modal-ov" id="maxModal">
  <div class="modal">
    <h3>Update estimated 1RMs</h3>
    <div class="mf"><label>HB Squat (kg)</label><input type="number" id="mxSq" inputmode="decimal"></div>
    <div class="mf"><label>Sumo Deadlift (kg)</label><input type="number" id="mxDl" inputmode="decimal"></div>
    <div class="mf"><label>Bench Press (kg)</label><input type="number" id="mxBn" inputmode="decimal"></div>
    <div class="modal-acts">
      <button class="btn-s" onclick="closeModal()">Cancel</button>
      <button class="btn-p" onclick="saveMaxes()">Save</button>
    </div>
  </div>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav" id="bottomNav">
  <button class="nav-btn active" id="navMain" onclick="openView('mainView')"><span class="ni">&#127947;</span>Train</button>
  <button class="nav-btn" id="navTable" onclick="openView('tableView')"><span class="ni">&#128203;</span>Table</button>
  <button class="nav-btn" id="navProgress" onclick="openView('progressView')"><span class="ni">&#128200;</span>Progress</button>
  <button class="nav-btn" id="navEdit" onclick="openView('editView')"><span class="ni">&#9998;</span>Edit</button>
</div>

<script>
// ══════════════════════════════════════════════════════════════
// MEET PREP — Block 1 (3wk) → Block 2 (4wk) → Block 3 (4wk) → Deload
// Meet: June 27, 2026
// Current e1RMs: SQ 180 / BP 115 / DL 230
// Meet targets: SQ 190 / BP 130 / DL 240
// Openers: SQ 170 / BP 110 / DL 220
// ══════════════════════════════════════════════════════════════

var TOTAL_WEEKS = 12; // 3 + 4 + 4 + 1 deload
var MEET_DATE = new Date('2026-06-27');

// Block structure
var BLOCKS = [
  {num:1, start:1, end:3, len:3, label:'Block 1'},
  {num:2, start:4, end:7, len:4, label:'Block 2'},
  {num:3, start:8, end:11, len:4, label:'Block 3'},
  {num:4, start:12, end:12, len:1, label:'Deload'}
];

function getBlock(week) {
  for (var i = 0; i < BLOCKS.length; i++) {
    if (week >= BLOCKS[i].start && week <= BLOCKS[i].end) return BLOCKS[i];
  }
  return BLOCKS[3];
}
function getBlockWeek(week) {
  var b = getBlock(week);
  return week - b.start + 1;
}

// RPE waves — scale to block length
// Primary: ramps from 5-6 to 8-9
// Secondary: ramps from 5-6 to 7-8
// Tertiary: mostly flat 5-6, last week 6-7
function getPrimaryRPE(week) {
  if (week === 12) return {range:'5-6', val:5.5, desc:'Deload — light singles only'};
  var b = getBlock(week), bw = getBlockWeek(week);
  var waves3 = [{r:'5-6',v:5.5},{r:'7-8',v:7.5},{r:'8-9',v:8.5}];
  var waves4 = [{r:'5-6',v:5.5},{r:'6-7',v:6.5},{r:'7-8',v:7.5},{r:'8-9',v:8.5}];
  var w = b.len === 3 ? waves3[bw-1] : waves4[bw-1];
  var isPeak = bw === b.len;
  var descs3 = ['Leave 4-5 in the tank','Push the weight, 2-3 left','Peak week — RPE 9 max, no grinding'];
  var descs4 = ['Leave 4-5 in the tank','Building, 3-4 left','Push the weight, 2-3 left','Peak week — RPE 9 max, no grinding'];
  var desc = b.len === 3 ? descs3[bw-1] : descs4[bw-1];
  return {range:w.r, val:w.v, desc:desc, isPeak:isPeak};
}
function getSecondaryRPE(week) {
  if (week === 12) return {range:'—', val:0, desc:'Deload — skip or very light'};
  var b = getBlock(week), bw = getBlockWeek(week);
  var waves3 = [{r:'5-6',v:5.5},{r:'6-7',v:6.5},{r:'7-8',v:7.5}];
  var waves4 = [{r:'5-6',v:5.5},{r:'6',v:6},{r:'6-7',v:6.5},{r:'7-8',v:7.5}];
  var w = b.len === 3 ? waves3[bw-1] : waves4[bw-1];
  return {range:w.r, val:w.v, desc:'Secondary — always below primary'};
}
function getTertiaryRPE(week) {
  if (week === 12) return {range:'—', val:0, desc:'Deload — skip'};
  var b = getBlock(week), bw = getBlockWeek(week);
  var waves3 = [{r:'5-6',v:5.5},{r:'5-6',v:5.5},{r:'6-7',v:6.5}];
  var waves4 = [{r:'5-6',v:5.5},{r:'5-6',v:5.5},{r:'5-6',v:5.5},{r:'6-7',v:6.5}];
  var w = b.len === 3 ? waves3[bw-1] : waves4[bw-1];
  return {range:w.r, val:w.v, desc:'Tertiary — skill practice only'};
}
function getVariationRPE(week) {
  if (week === 12) return {range:'—', val:0, desc:'Deload'};
  var b = getBlock(week), bw = getBlockWeek(week);
  var waves3 = [{r:'6',v:6},{r:'7',v:7},{r:'8',v:8}];
  var waves4 = [{r:'6',v:6},{r:'6-7',v:6.5},{r:'7',v:7},{r:'8',v:8}];
  var w = b.len === 3 ? waves3[bw-1] : waves4[bw-1];
  return {range:w.r, val:w.v, desc:'Variation — ascending RPE, fixed reps'};
}

// ── SUGGESTED WEIGHTS ──
// These are guidance only. RPE is the real target.
// Computed from the periodization table we agreed on.
var SUGGESTED = {
  // [week] → {exerciseId: 'weight × reps'}
  // Block 1: weeks 1-3
  // Block 2: weeks 4-7
  // Block 3: weeks 8-11
  // Week 12: deload
  d1e1: {1:'140×3',2:'152.5×2',3:'162.5×1',4:'145×3',5:'155×2',6:'162.5×2',7:'172.5×1',8:'150×3',9:'160×2',10:'170×2',11:'182.5×1',12:'120×5'},
  d1e2: {1:'115×5',2:'115×5',3:'115×5',4:'117.5×5',5:'117.5×5',6:'117.5×5',7:'117.5×5',8:'120×5',9:'120×5',10:'120×5',11:'120×5',12:'120×5'},
  d1e3: {1:'95×1',2:'102.5×1',3:'107.5×1',4:'97.5×1',5:'102.5×1',6:'107.5×1',7:'112.5×1',8:'102.5×1',9:'107.5×1',10:'115×1',11:'122.5×1',12:'80×5'},
  d1e4: {1:'80×5',2:'80×5',3:'80×5',4:'80×5',5:'80×5',6:'80×5',7:'80×5',8:'82.5×5',9:'82.5×5',10:'82.5×5',11:'82.5×5',12:'82.5×5'},
  d2e1: {1:'120×5',2:'130×5',3:'140×5',4:'125×5',5:'132.5×5',6:'137.5×5',7:'145×5',8:'130×5',9:'137.5×5',10:'142.5×5',11:'150×5',12:'100×6'},
  d2e1b:{1:'95×6',2:'95×6',3:'95×6',4:'97.5×6',5:'97.5×6',6:'97.5×6',7:'97.5×6',8:'100×6',9:'100×6',10:'100×6',11:'100×6',12:'100×6'},
  d4e1: {1:'120×3',2:'127.5×2-3',3:'135×2',4:'125×3',5:'130×3',6:'137.5×2-3',7:'145×2',8:'130×3',9:'135×3',10:'142.5×2-3',11:'150×2',12:'—'},
  d4e2: {1:'100×3',2:'100×3',3:'100×3',4:'102.5×3',5:'102.5×3',6:'102.5×3',7:'102.5×3',8:'105×3',9:'105×3',10:'105×3',11:'105×3',12:'—'},
  d6e1: {1:'185×2-3',2:'200×2',3:'212.5×1',4:'190×2-3',5:'200×2',6:'210×2',7:'222.5×1',8:'195×2-3',9:'207.5×2',10:'217.5×2',11:'230×1',12:'140×4'},
  d6e2: {1:'140×4',2:'140×4',3:'140×4',4:'142.5×4',5:'142.5×4',6:'142.5×4',7:'142.5×4',8:'145×4',9:'145×4',10:'145×4',11:'145×4',12:'140×4'},
  d6e3: {1:'80×1',2:'80×1',3:'85×1',4:'82.5×1',5:'82.5×1',6:'87.5×1',7:'87.5×1',8:'85×1',9:'85×1',10:'90×1',11:'90×1',12:'—'},
};

// Meet day attempt plan
var MEET_ATTEMPTS = {squat:[170,180,190], bench:[110,120,130], deadlift:[220,230,240]};

var DEFAULT_PROGRAM = [
  {day:1, name:'Mon', rest:false, exercises:[
    {id:'d1e1',name:'High Bar Squat',v:'Top set',type:'main'},
    {id:'d1e2',name:'High Bar Squat',v:'Back-off — 4×5 · fixed from W1 of block',type:'backoff'},
    {id:'d1e3',name:'Bench Press',v:'Top single',type:'main'},
    {id:'d1e4',name:'Bench Press',v:'Back-off — 4×5 · top single −20% · fixed from W1',type:'backoff'},
    {id:'d1e5',name:'Decline Fly',v:'2×8-12 · RPE 9',type:'accessory'},
    {id:'d1e6',name:'Tricep Pushdown',v:'3×8-10 · RPE 9 · rope/V-bar',type:'accessory'},
    {id:'d1e8',name:'Rear Delt Raise',v:'3×10-12 · RPE 9',type:'accessory'},
    {id:'d1e9',name:'Lateral Raise',v:'3×10-12 · RPE 9',type:'accessory'}
  ]},
  {day:2, name:'Tue', rest:false, exercises:[
    {id:'d2e1',name:'RDL',v:'Top set — fixed reps, ascending RPE',type:'variation'},
    {id:'d2e1b',name:'RDL',v:'Back-off — 2×6 · fixed from W1 of block',type:'backoff'},
    {id:'d2e2',name:'Nordic Curl',v:'2-3 sets · log degrees · RPE 8-9',type:'accessory'},
    {id:'d2e3',name:'Pelican Curl',v:'3×8-10 · RPE 9',type:'accessory'},
    {id:'d2e4',name:'Ring Curl',v:'3×8-10 · RPE 9',type:'accessory'},
    {id:'d2e5',name:'BOR',v:'3×6-8 · RPE 8-9',type:'accessory'},
    {id:'d2e6',name:'Wide Grip Chin',v:'2-3×6-8 · RPE 8-9',type:'accessory'},
    {id:'d2e10',name:'Narrow Grip Row',v:'3×6-8 · pull to hip · RPE 8-9',type:'accessory'},
    {id:'d2e7',name:'Core / Abs',v:'3×10-15 · RPE 8-9',type:'accessory'}
  ]},
  {day:3, name:'Wed', rest:true, restLabel:'Rest', restEmoji:'&#128564;', exercises:[]},
  {day:4, name:'Thu', rest:false, exercises:[
    {id:'d4e1',name:'Pause HB Squat',v:'Top set — 2-3s pause at bottom',type:'secondary'},
    {id:'d4e2',name:'Pause HB Squat',v:'Back-off — 3×3 · fixed from W1 · maintain pause',type:'backoff'},
    {id:'d4e3',name:'Technique Bench',v:'5×10-12 · low intensity · drill lockout & bar path · RPE 5-6 all weeks',type:'variation'},
    {id:'d4e4',name:'Incline Fly',v:'2×8-12 · RPE 9',type:'accessory'},
    {id:'d4e5',name:'Tricep Pushdown',v:'3×8-10 · RPE 9 · rope/V-bar',type:'accessory'},
    {id:'d4e6',name:'JM Press',v:'3×8-10 · low intensity · RPE 6-7',type:'accessory'},
    {id:'d4e7',name:'Lateral Raise',v:'3×10-12 · RPE 9',type:'accessory'},
    {id:'d4e8',name:'Leg Extension',v:'2×8-12 · RPE 9',type:'accessory'},
    {id:'d4e9',name:'Leg Press',v:'3×8-10 · RPE 8-9',type:'accessory'}
  ]},
  {day:5, name:'Fri', rest:true, restLabel:'Rest', restEmoji:'&#128564;', exercises:[]},
  {day:6, name:'Sat', rest:false, exercises:[
    {id:'d6e1',name:'Sumo Deadlift',v:'Top set',type:'main'},
    {id:'d6e2',name:'Sumo Deadlift',v:'Back-off — 3×4 · ~60% · fixed from W1',type:'backoff'},
    {id:'d6e3',name:'Bench Press',v:'Tertiary single — always well below Mon',type:'secondary'},
    {id:'d6e4',name:'Bench Press',v:'5×15-20 · low intensity · pec focus · RPE 5-6',type:'variation'},
    {id:'d6e9',name:'DB Incline Press',v:'3×6-8 · semi-neutral grip · RPE 7-8',type:'accessory'},
    {id:'d6e5',name:'Wide Grip Chin',v:'2-3×6-8 · RPE 8-9',type:'accessory'},
    {id:'d6e6',name:'Power Shrugs',v:'3×5-6 · heavy · explosive',type:'accessory'},
    {id:'d6e7',name:'Ring Curl',v:'3×8-10 · RPE 9',type:'accessory'},
    {id:'d6e8',name:'Pelican Curl',v:'3×8-10 · RPE 9',type:'accessory'}
  ]},
  {day:7, name:'Sun', rest:true, restLabel:'Rest', restEmoji:'&#128564;', exercises:[]}
];

// Deload week program override
var DELOAD_PROGRAM = [
  {day:1, name:'Mon', rest:false, deloadNote:'Back-offs only — no top sets. Light accessories optional.', exercises:[
    {id:'d1e2',name:'High Bar Squat',v:'Back-off only — 4×5 @ 120kg',type:'backoff'},
    {id:'d1e4',name:'Bench Press',v:'Back-off only — 4×5 @ 82.5kg',type:'backoff'}
  ]},
  {day:2, name:'Tue', rest:false, deloadNote:'RDL back-offs only. Skip if fatigued.', exercises:[
    {id:'d2e1b',name:'RDL',v:'Back-off only — 2×6 @ 100kg',type:'backoff'}
  ]},
  {day:3, name:'Wed', rest:true, restLabel:'Rest', restEmoji:'&#128564;', exercises:[]},
  {day:4, name:'Thu', rest:false, deloadNote:'Opener rehearsal — easy singles, leave immediately.', exercises:[
    {id:'dl_sq',name:'Squat Opener',v:'170×1 — RPE 7 max',type:'main'},
    {id:'dl_bp',name:'Bench Opener',v:'110×1 — RPE 7 max',type:'main'},
    {id:'dl_dl',name:'Deadlift Opener',v:'220×1 — RPE 7 max',type:'main'}
  ]},
  {day:5, name:'Fri', rest:true, restLabel:'Rest', restEmoji:'&#128161;', exercises:[]},
  {day:6, name:'Sat', rest:true, restLabel:'MEET DAY', restEmoji:'&#127942;', meetDay:true, exercises:[]},
  {day:7, name:'Sun', rest:true, restLabel:'Celebrate', restEmoji:'&#127881;', exercises:[]}
];

// State
var S = {
  maxes:{squat:180, deadlift:230, bench:115},
  program:JSON.parse(JSON.stringify(DEFAULT_PROGRAM)),
  logs:{},
  doneDays:{},
  week:1,
  day:1,
  editDay:1,
  progLift:'High Bar Squat'
};

// ── STORAGE ──
function save() {
  try { localStorage.setItem('meetprep2026', JSON.stringify(S)); } catch(e) {}
}
function load() {
  try {
    var d = localStorage.getItem('meetprep2026');
    if (d) {
      var parsed = JSON.parse(d);
      S.maxes = parsed.maxes || S.maxes;
      S.logs = parsed.logs || {};
      S.doneDays = parsed.doneDays || {};
      S.week = parsed.week || 1;
      S.day = parsed.day || 1;
      S.editDay = parsed.editDay || 1;
      S.progLift = parsed.progLift || 'High Bar Squat';
      if (parsed.program) S.program = parsed.program;
      else S.program = JSON.parse(JSON.stringify(DEFAULT_PROGRAM));
    }
  } catch(e) {}
}

// ── HELPERS ──
function toast(msg, dur) {
  var el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(function(){ el.classList.remove('show'); }, dur||2000);
}
function fireConfetti() {
  var colors = ['#c8ff00','#00c96e','#fff','#ff4d4d','#4da6ff'];
  for (var i=0;i<40;i++) {
    (function(i){setTimeout(function(){
      var el=document.createElement('div');el.className='confetti-piece';
      el.style.left=(Math.random()*100)+'vw';el.style.top='-10px';
      el.style.background=colors[Math.floor(Math.random()*colors.length)];
      el.style.animationDelay=(Math.random()*0.4)+'s';
      el.style.animationDuration=(0.8+Math.random()*0.6)+'s';
      document.body.appendChild(el);
      setTimeout(function(){el.remove();},1500);
    },i*20);})(i);
  }
}

function getCurrentProgram() {
  if (S.week === 12) return DELOAD_PROGRAM;
  return S.program;
}

function getSuggested(exId, week) {
  if (SUGGESTED[exId] && SUGGESTED[exId][week]) return SUGGESTED[exId][week];
  return null;
}

function getRPEForExercise(exId, type, week) {
  if (type === 'main') return getPrimaryRPE(week);
  if (type === 'secondary') {
    if (exId === 'd6e3') return getTertiaryRPE(week);
    return getSecondaryRPE(week);
  }
  if (type === 'variation') return getVariationRPE(week);
  if (type === 'backoff') return {range:'Fixed',val:0,desc:'Weight set in W1 of block — do not change'};
  return null;
}

// ── COUNTDOWN ──
function renderCountdown() {
  var now = new Date();
  var diff = MEET_DATE - now;
  var days = Math.ceil(diff / (1000*60*60*24));
  var el = document.getElementById('countdown');
  if (days <= 0) el.innerHTML = '&#127942; <strong>MEET DAY</strong> — go lift';
  else if (days === 1) el.innerHTML = '&#128293; <strong>1 day</strong> to meet';
  else el.innerHTML = '<strong>' + days + ' days</strong> to meet — Jun 27';
}

// ── MAXES ──
function renderMaxes() {
  var items = [
    {lbl:'HB Squat',v:S.maxes.squat,t:MEET_ATTEMPTS.squat[2]},
    {lbl:'Sumo DL',v:S.maxes.deadlift,t:MEET_ATTEMPTS.deadlift[2]},
    {lbl:'Bench',v:S.maxes.bench,t:MEET_ATTEMPTS.bench[2]}
  ];
  var html = '';
  for (var i=0;i<items.length;i++) {
    html += '<div class="max-pill" onclick="openMaxModal()"><div class="lbl">'+items[i].lbl+'</div><div class="kg">'+items[i].v+'</div><div class="lbl">kg e1RM</div></div>';
  }
  html += '<div class="meet-pill"><div class="lbl">Meet total target</div><div class="kg">'+MEET_ATTEMPTS.squat[2]+'/'+MEET_ATTEMPTS.bench[2]+'/'+MEET_ATTEMPTS.deadlift[2]+' = '+(MEET_ATTEMPTS.squat[2]+MEET_ATTEMPTS.bench[2]+MEET_ATTEMPTS.deadlift[2])+'</div></div>';
  html += '<div class="edit-max-pill" onclick="openMaxModal()">&#9998; Edit</div>';
  document.getElementById('maxesStrip').innerHTML = html;
}
function openMaxModal() {
  document.getElementById('mxSq').value = S.maxes.squat;
  document.getElementById('mxDl').value = S.maxes.deadlift;
  document.getElementById('mxBn').value = S.maxes.bench;

}
function closeModal() { document.getElementById('maxModal').classList.remove('open'); }
function saveMaxes() {
  S.maxes.squat = parseFloat(document.getElementById('mxSq').value)||S.maxes.squat;
  S.maxes.deadlift = parseFloat(document.getElementById('mxDl').value)||S.maxes.deadlift;

}
document.getElementById('maxModal').addEventListener('click', function(e){

});

// ── WEEK / DAY SELECTORS ──

function renderDayTabs() {
  var prog = getCurrentProgram();
  var c = document.getElementById('dayTabs'); c.innerHTML = '';
  for (var i=0;i<prog.length;i++) {
    var d = prog[i];

// ── LOG HELPERS ──
function getLog(w,d,id) {
  if (!S.logs[w]) S.logs[w]={};
  if (!S.logs[w][d]) S.logs[w][d]={};
  if (!S.logs[w][d][id]) S.logs[w][d][id]={sets:[],notes:''};
  return S.logs[w][d][id];
}

// ── DAY CONTENT ──
function renderDayContent() {
  var prog = getCurrentProgram();
  var dayData = null;
  for (var i=0;i<prog.length;i++) { if (prog[i].day===S.day) { dayData=prog[i]; break; } }
  var cont = document.getElementById('dayContent');
  if (!dayData) return;
  var isDone = !!S.doneDays[S.week+'_'+S.day];

  if (dayData.rest) {
    var meetHtml = '';
    if (dayData.meetDay) {
      meetHtml = '<div style="margin-top:20px;background:var(--card);border:1px solid rgba(255,77,77,.3);border-radius:14px;padding:16px;text-align:left">'
        +'<div style="font-size:.62rem;text-transform:uppercase;letter-spacing:2px;color:rgba(255,77,77,.6);margin-bottom:10px">Attempt plan</div>'
        +'<div style="font-size:.85rem;margin-bottom:6px"><strong>Squat:</strong> '+MEET_ATTEMPTS.squat.join(' → ')+' kg</div>'
        +'<div style="font-size:.85rem;margin-bottom:6px"><strong>Bench:</strong> '+MEET_ATTEMPTS.bench.join(' → ')+' kg</div>'
        +'<div style="font-size:.85rem;margin-bottom:6px"><strong>Deadlift:</strong> '+MEET_ATTEMPTS.deadlift.join(' → ')+' kg</div>'
        +'<div style="font-size:.72rem;color:var(--sub);margin-top:10px">Openers RPE 7 max. Seconds based on warm-up feel. Thirds are the gamble.</div>'
        +'</div>';
    }
    cont.innerHTML = '<div class="rest-screen">'
      +'<div class="ri">'+(dayData.restEmoji||'&#128564;')+'</div>'
      +'<h2>'+(dayData.restLabel||'Rest')+' Day</h2>'
      +'<p>'+(dayData.meetDay?'Go get that total':'Recovery is part of training')+'</p>'
      +meetHtml+'</div>'
      +'<button class="complete-btn'+(isDone?' done':'')+'" onclick="toggleDayDone()">'+(isDone?'&#10003; COMPLETE':'MARK COMPLETE')+'</button>';
    return;
  }

  var html = '';
  if (dayData.deloadNote) {
    html += '<div style="background:rgba(255,77,77,.06);border:1px solid rgba(255,77,77,.2);border-radius:10px;padding:10px 14px;margin:12px 0 0;font-size:.78rem;color:#ff6b6b">'+dayData.deloadNote+'</div>';
  }

  var mainEx=[], accEx=[];
  for (var i=0;i<dayData.exercises.length;i++) {
    var ex=dayData.exercises[i];
    if (ex.type==='main'||ex.type==='secondary'||ex.type==='backoff'||ex.type==='variation') mainEx.push(ex);
    else accEx.push(ex);
  }
  if (mainEx.length) {
    html += '<div class="section-label">Main lifts</div>';
    for (var i=0;i<mainEx.length;i++) html += buildExCard(mainEx[i]);
  }
  if (accEx.length) {
    html += '<div class="section-label">Accessories</div>';
    for (var i=0;i<accEx.length;i++) html += buildExCard(accEx[i]);
  }
  html += '<button class="complete-btn'+(isDone?' done':'')+'" onclick="toggleDayDone()">'+(isDone?'&#10003; COMPLETE':'MARK COMPLETE')+'</button>';
  cont.innerHTML = html;
  attachListeners();
}

function buildExCard(ex) {
  var log = getLog(S.week, S.day, ex.id);
  var isMain = (ex.type==='main'||ex.type==='secondary'||ex.type==='variation');
  var allDone = log.sets.length > 0;
  for (var i=0;i<log.sets.length;i++) { if (!log.sets[i].done) { allDone=false; break; } }
  var doneCount=0;
  for (var i=0;i<log.sets.length;i++) { if (log.sets[i].done) doneCount++; }
  var lastW = (log.sets.length>0&&log.sets[log.sets.length-1].w) ? ' · '+log.sets[log.sets.length-1].w+'kg' : '';
  var summary = log.sets.length>0 ? (doneCount+'/'+log.sets.length+' sets logged'+lastW) : 'Tap to log sets';
  var badgeLabel = ex.type==='main'?'Primary':ex.type==='secondary'?'Secondary':ex.type==='backoff'?'Backoff':ex.type==='variation'?'Variation':'Accessory';
  var badgeCls = (ex.type==='main'||ex.type==='secondary'||ex.type==='variation')?'badge-main':'badge-acc';

  var rpeInfo = getRPEForExercise(ex.id, ex.type, S.week);
  var rpeBadge='', rpeBar='', suggestedBar='';

  if (rpeInfo && ex.type!=='backoff' && ex.type!=='accessory') {
    var isPeak = rpeInfo.isPeak;
    rpeBadge = '<span class="badge-rpe'+(isPeak?' rpe-peak':'')+'">RPE '+rpeInfo.range+'</span>';
    var b = getBlock(S.week);
    rpeBar = '<div class="rpe-target-bar'+(isPeak?' rpe-peak-bar':'')+'">'
      +'<div><div class="rpe-target-label">'+badgeLabel+' · '+b.label+' · W'+getBlockWeek(S.week)+'/'+b.len+'</div>'
      +'<div class="rpe-target-val"'+(isPeak?' style="color:#ff6b6b"':'')+'>'+rpeInfo.range+'</div></div>'
      +'<div class="rpe-target-desc">'+rpeInfo.desc+'</div></div>';
  }
  if (ex.type==='backoff') {
    var b = getBlock(S.week);
    rpeBar = '<div class="rpe-target-bar"><div><div class="rpe-target-label">Back-off · '+b.label+'</div>'
      +'<div class="rpe-target-val" style="font-size:.78rem;color:var(--sub)">Fixed weight</div></div>'
      +'<div class="rpe-target-desc">Set in W1 of block — do not change</div></div>';
  }

  var sugg = getSuggested(ex.id, S.week);
  if (sugg && sugg !== '—') {
    suggestedBar = '<div class="suggested-bar"><div><div class="s-label">Suggested</div>'
      +'<div class="s-val">'+sugg+' kg</div></div>'
      +'<div class="s-note">RPE dictates — adjust to feel</div></div>';
  }

  var setRows='';
  for (var i=0;i<log.sets.length;i++) {
    var s=log.sets[i];
    setRows += '<div class="set-row">'
      +'<span class="set-num">'+(i+1)+'</span>'
      +'<input class="set-inp" type="number" inputmode="decimal" placeholder="kg" value="'+(s.w||'')+'" data-exid="'+ex.id+'" data-i="'+i+'" data-f="w">'
      +'<input class="set-inp" type="text" placeholder="reps" value="'+(s.r||'')+'" data-exid="'+ex.id+'" data-i="'+i+'" data-f="r">'
      +'<button class="tick-btn'+(s.done?' done':'')+'" onclick="toggleSet(\''+ex.id+'\','+i+')">&#10003;</button>'
      +'<button class="del-set-btn" onclick="deleteSet(\''+ex.id+'\','+i+')" title="Remove">&#10005;</button>'
      +'</div>';
  }

  return '<div class="ex-card'+(isMain?' main-lift':'')+(allDone?' fully-done':'')+'" id="ec_'+ex.id+'">'
    +'<div class="ex-header" onclick="toggleCard(\''+ex.id+'\')">'
    +'<div class="ex-check" onclick="quickCheck(event,\''+ex.id+'\')">'+(allDone?'&#10003;':'')+'</div>'
    +'<div class="ex-info">'
    +'<div class="ex-name-row"><span class="ex-name">'+ex.name+'</span>'
    +(ex.v?'<span class="ex-var">'+ex.v+'</span>':'')
    +'<span class="ex-badge '+badgeCls+'">'+badgeLabel+'</span>'
    +rpeBadge+'</div>'
    +'<div class="ex-summary">'+summary+'</div>'
    +'</div><span class="ex-chevron">&#9662;</span></div>'
    +'<div class="ex-body">'
    +rpeBar
    +suggestedBar
    +(log.sets.length>0?'<div class="sets-header"><span>#</span><span>kg</span><span>Reps</span><span>&#10003;</span><span></span></div>':'')
    +'<div id="sl_'+ex.id+'">'+setRows+'</div>'
    +'<button class="add-set-btn" onclick="addSet(\''+ex.id+'\')">+ Add set</button>'
    +'<textarea class="notes-ta" rows="2" placeholder="Notes..." data-notes="'+ex.id+'">'+(log.notes||'')+'</textarea>'
    +'</div></div>';
}

function attachListeners() {
  var inps=document.querySelectorAll('.set-inp');
  for (var i=0;i<inps.length;i++) {
    inps[i].addEventListener('change',function(e){
      var log=getLog(S.week,S.day,e.target.getAttribute('data-exid'));
      var idx=parseInt(e.target.getAttribute('data-i'));
      var field=e.target.getAttribute('data-f');
      if(!log.sets[idx])log.sets[idx]={w:'',r:'',done:false};
      log.sets[idx][field]=e.target.value;
      save(); refreshSummary(e.target.getAttribute('data-exid'));
    });
  }
  var tas=document.querySelectorAll('[data-notes]');
  for (var i=0;i<tas.length;i++) {
    tas[i].addEventListener('change',function(e){
      getLog(S.week,S.day,e.target.getAttribute('data-notes')).notes=e.target.value; save();
    });
  }
}

function toggleCard(id) { var c=document.getElementById('ec_'+id); if(c)c.classList.toggle('open'); }
function quickCheck(event,id) {
  event.stopPropagation();
  var log=getLog(S.week,S.day,id);
  var allDone=log.sets.length>0;
  for (var i=0;i<log.sets.length;i++){if(!log.sets[i].done){allDone=false;break;}}
  if(allDone){for(var i=0;i<log.sets.length;i++)log.sets[i].done=false;}
  else if(log.sets.length===0){log.sets.push({w:'',r:'',done:true});}
  else{for(var i=0;i<log.sets.length;i++)log.sets[i].done=true;}
  save();reRenderCard(id);
}
function toggleSet(exId,idx){var log=getLog(S.week,S.day,exId);if(log.sets[idx])log.sets[idx].done=!log.sets[idx].done;save();reRenderCard(exId);}
function deleteSet(exId,idx){var log=getLog(S.week,S.day,exId);log.sets.splice(idx,1);save();reRenderCard(exId,true);}
function addSet(exId){
  var log=getLog(S.week,S.day,exId);
  var last=log.sets.length>0?log.sets[log.sets.length-1]:null;
  log.sets.push({w:last?last.w:'',r:last?last.r:'',done:false});
  save();reRenderCard(exId,true);
}
function reRenderCard(exId,keepOpen) {
  var prog=getCurrentProgram();
  var dayData=null;
  for(var i=0;i<prog.length;i++){if(prog[i].day===S.day){dayData=prog[i];break;}}
  if(!dayData)return;
  var ex=null;
  for(var i=0;i<dayData.exercises.length;i++){if(dayData.exercises[i].id===exId){ex=dayData.exercises[i];break;}}
  if(!ex)return;
  var card=document.getElementById('ec_'+exId);if(!card)return;
  var wasOpen=card.classList.contains('open');
  var tmp=document.createElement('div');
  tmp.innerHTML=buildExCard(ex);
  card.parentNode.replaceChild(tmp.firstChild,card);
  attachListeners();
  if(wasOpen||keepOpen){var nc=document.getElementById('ec_'+exId);if(nc)nc.classList.add('open');}
  renderDayTabs();
}
function refreshSummary(exId) {
  var log=getLog(S.week,S.day,exId);
  var card=document.getElementById('ec_'+exId);if(!card)return;
  var el=card.querySelector('.ex-summary');if(!el)return;
  var dc=0;for(var i=0;i<log.sets.length;i++){if(log.sets[i].done)dc++;}
  var lw=(log.sets.length>0&&log.sets[log.sets.length-1].w)?' · '+log.sets[log.sets.length-1].w+'kg':'';
  el.innerHTML=log.sets.length>0?(dc+'/'+log.sets.length+' sets logged'+lw):'Tap to log sets';
}
function toggleDayDone() {
  var k=S.week+'_'+S.day;
  var wasDone=!!S.doneDays[k];
  S.doneDays[k]=!wasDone;
  save();
  if(!wasDone){fireConfetti();toast('Day complete! Great work 💪',2500);}
  renderDayTabs();renderDayContent();
}

// ── SWIPE ──
var touchStartX=0,touchStartY=0;
document.getElementById('swipeWrap').addEventListener('touchstart',function(e){
  touchStartX=e.touches[0].clientX;touchStartY=e.touches[0].clientY;
},{passive:true});
document.getElementById('swipeWrap').addEventListener('touchend',function(e){
  var dx=e.changedTouches[0].clientX-touchStartX;
  var dy=e.changedTouches[0].clientY-touchStartY;
  if(Math.abs(dx)<50||Math.abs(dy)>Math.abs(dx))return;
  if(dx<0)navigateDay(1);else navigateDay(-1);
});
function navigateDay(dir) {
  var prog=getCurrentProgram();
  var idx=-1;
  for(var i=0;i<prog.length;i++){if(prog[i].day===S.day){idx=i;break;}}
  var next=idx+dir;
  if(next<0){if(S.week>1){S.week--;next=getCurrentProgram().length-1;}else return;}
  else if(next>=prog.length){if(S.week<TOTAL_WEEKS){S.week++;next=0;}else return;}
  var cont=document.getElementById('dayContent');
  cont.classList.add(dir>0?'slide-left':'slide-right');
  setTimeout(function(){
    var p=getCurrentProgram();
    S.day=p[next].day;save();
    cont.classList.remove('slide-left','slide-right');
    renderWeekBtns();renderDayTabs();renderDayContent();updateSwipeHints();
  },180);
}
function updateSwipeHints() {
  var prog=getCurrentProgram();
  var idx=-1;
  for(var i=0;i<prog.length;i++){if(prog[i].day===S.day){idx=i;break;}}
  var l=document.getElementById('swipeLeft'),r=document.getElementById('swipeRight');
  if(!l||!r)return;
  l.textContent=idx>0?'\u2190 '+prog[idx-1].name:(S.week>1?'\u2190 Wk'+(S.week-1):'');
  r.textContent=idx<prog.length-1?prog[idx+1].name+' \u2192':(S.week<TOTAL_WEEKS?'Wk'+(S.week+1)+' \u2192':'');
}

var lastScrollY=0;
window.addEventListener('scroll',function(){
  var cur=window.scrollY;
  var hdr=document.getElementById('mainHeader'),nav=document.getElementById('bottomNav');

  else{if(hdr)hdr.classList.remove('hidden');if(nav)nav.classList.remove('hidden');}

},{passive:true});

function openView(id) {
  var views=document.querySelectorAll('.view');
  for(var i=0;i<views.length;i++)views[i].classList.remove('active');
  document.getElementById(id).classList.add('active');
  var navMap={mainView:'navMain',tableView:'navTable',progressView:'navProgress',editView:'navEdit'};
  var navBtns=document.querySelectorAll('.nav-btn');
  for(var i=0;i<navBtns.length;i++)navBtns[i].classList.remove('active');
  if(navMap[id])document.getElementById(navMap[id]).classList.add('active');

// ── TABLE VIEW ──
function renderTable() {
  var html='<table class="prog-table"><thead><tr><th>Exercise</th><th>Type</th>';
  for(var w=1;w<=TOTAL_WEEKS;w++){
    var b=getBlock(w),bw=getBlockWeek(w);
    var isDeload=w===12;
    var rpe=getPrimaryRPE(w);
    html+='<th>'+(bw===1?'<span style="font-size:.5rem;color:var(--muted);display:block">'+b.label+'</span>':'')
      +(isDeload?'DL':'Wk '+w)
      +'<br><span style="color:'+(rpe.isPeak||isDeload?'#ff6b6b':'var(--accent)')+';font-size:.55rem">RPE '+rpe.range+(rpe.isPeak?' ★':'')+'</span></th>';
  }
  html+='</tr></thead><tbody>';
  for(var di=0;di<S.program.length;di++){
    var dd=S.program[di];
    if(dd.rest)continue;
    html+='<tr class="day-head-row"><td colspan="'+(2+TOTAL_WEEKS)+'">'+dd.name+'</td></tr>';
    for(var ei=0;ei<dd.exercises.length;ei++){
      var ex=dd.exercises[ei];
      html+='<tr><td class="ex-cell">'+ex.name+(ex.v?'<br><span style="color:var(--muted);font-size:.68rem">'+ex.v+'</span>':'')+'</td>'
        +'<td style="color:var(--muted);font-size:.72rem">'+(ex.type==='main'?'Primary':ex.type==='secondary'?'Secondary':ex.type==='variation'?'Variation':ex.type==='backoff'?'Backoff':'Accessory')+'</td>';
      for(var w=1;w<=TOTAL_WEEKS;w++){
        var cellId='tc_'+w+'_'+dd.day+'_'+ex.id;
        var sugg=getSuggested(ex.id,w);
        html+='<td id="'+cellId+'" style="min-width:110px">'
          +(sugg?'<div class="tbl-suggested">Sugg: '+sugg+'</div>':'')
          +buildTblCell(w,dd.day,ex.id)+'</td>';
      }
      html+='</tr>';
    }
  }
  html+='</tbody></table>';
  document.getElementById('tableWrap').innerHTML=html;
}

function buildTblCell(w,day,exId) {
  var log=getLog(w,day,exId);
  var html='';
  for(var i=0;i<log.sets.length;i++){
    var s=log.sets[i];
    html+='<div class="tbl-set-row">'
      +'<span style="font-size:.62rem;color:var(--muted);min-width:12px">'+(i+1)+'.</span>'
      +'<input class="tbl-inp" type="number" inputmode="decimal" placeholder="kg" value="'+(s.w||'')+'" onchange="tblUpd('+w+','+day+',\''+exId+'\','+i+',\'w\',this.value)">'
      +'<span class="tbl-x">x</span>'
      +'<input class="tbl-inp ri" type="text" placeholder="reps" value="'+(s.r||'')+'" onchange="tblUpd('+w+','+day+',\''+exId+'\','+i+',\'r\',this.value)">'
      +'<button class="tbl-tick'+(s.done?' done':'')+'" onclick="tblTick('+w+','+day+',\''+exId+'\','+i+')">&#10003;</button>'
      +'<button class="tbl-del" onclick="tblDel('+w+','+day+',\''+exId+'\','+i+')">&#10005;</button>'
      +'</div>';
  }
  html+='<button class="tbl-add" onclick="tblAdd('+w+','+day+',\''+exId+'\')">+ set</button>';
  return html;
}
function tblUpd(w,day,exId,idx,field,val){var log=getLog(w,day,exId);if(!log.sets[idx])log.sets[idx]={w:'',r:'',done:false};log.sets[idx][field]=val;save();}
function tblTick(w,day,exId,idx){var log=getLog(w,day,exId);if(log.sets[idx])log.sets[idx].done=!log.sets[idx].done;save();var el=document.getElementById('tc_'+w+'_'+day+'_'+exId);if(el){var sugg=getSuggested(exId,w);el.innerHTML=(sugg?'<div class="tbl-suggested">Sugg: '+sugg+'</div>':'')+buildTblCell(w,day,exId);}}
function tblDel(w,day,exId,idx){var log=getLog(w,day,exId);log.sets.splice(idx,1);save();var el=document.getElementById('tc_'+w+'_'+day+'_'+exId);if(el){var sugg=getSuggested(exId,w);el.innerHTML=(sugg?'<div class="tbl-suggested">Sugg: '+sugg+'</div>':'')+buildTblCell(w,day,exId);}}
function tblAdd(w,day,exId){var log=getLog(w,day,exId);var last=log.sets.length>0?log.sets[log.sets.length-1]:null;log.sets.push({w:last?last.w:'',r:last?last.r:'',done:false});save();var el=document.getElementById('tc_'+w+'_'+day+'_'+exId);if(el){var sugg=getSuggested(exId,w);el.innerHTML=(sugg?'<div class="tbl-suggested">Sugg: '+sugg+'</div>':'')+buildTblCell(w,day,exId);}}

// CSV
function exportCSV() {
  var rows=[['Week','Block','Day','Exercise','Type','Set','Weight(kg)','Reps','Done','Suggested']];
  for(var w=1;w<=TOTAL_WEEKS;w++){
    var b=getBlock(w);
    for(var di=0;di<S.program.length;di++){
      var dd=S.program[di];if(dd.rest)continue;
      for(var ei=0;ei<dd.exercises.length;ei++){
        var ex=dd.exercises[ei];
        var log=S.logs[w]&&S.logs[w][dd.day]&&S.logs[w][dd.day][ex.id];
        var sugg=getSuggested(ex.id,w)||'';
        if(!log||!log.sets.length){rows.push([w,b.label,dd.name,ex.name,ex.type,'','','','No',sugg]);continue;}
        for(var si=0;si<log.sets.length;si++){
          var s=log.sets[si];
          rows.push([w,b.label,dd.name,ex.name,ex.type,si+1,s.w||'',s.r||'',s.done?'Yes':'No',sugg]);
        }
      }
    }
  }
  var csv=rows.map(function(r){return r.map(function(c){return '"'+String(c).replace(/"/g,'""')+'"';}).join(',');}).join('\n');
  var blob=new Blob([csv],{type:'text/csv'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='meetprep_'+new Date().toISOString().slice(0,10)+'.csv';
  a.click();toast('CSV exported');
}

// ── PROGRESS ──
var progView='log', progExId=null;
function setProgView(v){
  progView=v;
  document.getElementById('progLogTab').style.display=v==='log'?'block':'none';
  document.getElementById('progGraphTab').style.display=v==='graph'?'block':'none';
  document.getElementById('pvtLog').classList.toggle('active',v==='log');
  document.getElementById('pvtGraph').classList.toggle('active',v==='graph');
  renderProgress();
}
function getAllExercises(){
  var items=[],seen={};
  for(var di=0;di<S.program.length;di++){
    var dd=S.program[di];if(dd.rest)continue;
    for(var ei=0;ei<dd.exercises.length;ei++){
      var ex=dd.exercises[ei];if(!ex.name)continue;
      var key=ex.id;
      if(seen[key])continue;seen[key]=true;
      items.push({id:ex.id,label:ex.name+(ex.v?' ('+ex.v+')':''),day:dd.day,type:ex.type});
    }
  }
  return items;
}
function getExerciseData(exId,dayNum){
  var data=[];
  for(var w=1;w<=TOTAL_WEEKS;w++){
    var log=S.logs[w]&&S.logs[w][dayNum]&&S.logs[w][dayNum][exId];
    var topW=null,topR=null;
    if(log&&log.sets.length){
      for(var si=0;si<log.sets.length;si++){
        var s=log.sets[si];if(!s.w)continue;
        var wv=parseFloat(s.w),rv=parseFloat(s.r)||0;
        if(topW===null||wv>topW||(wv===topW&&rv>topR)){topW=wv;topR=rv;}
      }
    }
    var b=getBlock(w);
    data.push({week:w,w:topW,r:topR,blockWk:getBlockWeek(w),blockNum:b.num,blockLabel:b.label});
  }
  return data;
}
function renderProgress(){
  var items=getAllExercises();
  if(!progExId&&items.length)progExId=items[0].id;
  var pickerHtml='';
  for(var i=0;i<items.length;i++){
    pickerHtml+='<button class="prog-ex-btn'+(progExId===items[i].id?' active':'')+'" onclick="selectProgEx(\''+items[i].id+'\')">'+items[i].label+'</button>';
  }
  document.getElementById('progGraphPicker').innerHTML=pickerHtml;
  if(progView==='log')renderProgLog(items);else renderProgGraph(items);
}
function selectProgEx(id){progExId=id;renderProgress();}
function renderProgLog(items){
  if(!items.length){document.getElementById('progLogContent').innerHTML='<div style="color:var(--muted);font-size:.82rem;padding:20px 0">No exercises</div>';return;}
  var html='<div class="maxes-board">';
  for(var i=0;i<items.length;i++){
    var item=items[i];
    var data=getExerciseData(item.id,item.day);
    var bestW=null,bestR=null;
    for(var j=0;j<data.length;j++){
      if(data[j].w!==null){if(bestW===null||data[j].w>bestW||(data[j].w===bestW&&data[j].r>bestR)){bestW=data[j].w;bestR=data[j].r;}}
    }
    html+='<div class="max-row'+(bestW!==null?' has-data':'')+'" onclick="selectProgEx(\''+item.id+'\');setProgView(\'graph\')">';
    html+='<div class="max-row-left"><div class="max-row-name">'+item.label+'</div><div class="max-row-day">'+item.type+'</div></div>';
    html+='<div class="max-row-right">';
    if(bestW!==null){html+='<div class="max-row-weight">'+bestW+' <span style="font-size:.9rem">kg</span></div><div class="max-row-reps">'+(bestR?bestR+' rep'+(bestR!=1?'s':''):'')+'</div>';}
    else{html+='<div class="max-row-empty">No data</div>';}
    html+='</div></div>';
  }
  html+='</div>';
  document.getElementById('progLogContent').innerHTML=html;
}
function renderProgGraph(items){
  var item=null;
  for(var i=0;i<items.length;i++){if(items[i].id===progExId){item=items[i];break;}}
  if(!item)return;
  document.getElementById('graphTitle').textContent=item.label;
  var data=getExerciseData(item.id,item.day);
  var filled=[];
  for(var i=0;i<data.length;i++){if(data[i].w!==null)filled.push({week:data[i].week,val:data[i].w,r:data[i].r,blockNum:data[i].blockNum,blockWk:data[i].blockWk,blockLabel:data[i].blockLabel});}
  var chartEl=document.getElementById('mainChart');
  var logHtml='';
  if(filled.length<2){
    chartEl.innerHTML='<div style="display:flex;align-items:center;justify-content:center;height:100%;color:var(--muted);font-size:.8rem">Need at least 2 weeks of data</div>';
  } else {
    var mn=Infinity,mx=-Infinity;
    for(var i=0;i<filled.length;i++){if(filled[i].val<mn)mn=filled[i].val;if(filled[i].val>mx)mx=filled[i].val;}
    var range=mx-mn;if(range===0){mn=mn*0.9;mx=mx*1.1;}else{mn=mn-range*0.1;mx=mx+range*0.1;}
    var W=300,H=100,pts='',area1='',area2='',circles='',labels='';
    for(var i=0;i<filled.length;i++){
      var x=(i/(filled.length-1))*W,y=H-((filled[i].val-mn)/(mx-mn))*H;
      if(i>0){pts+=' ';area1+=' ';}pts+=x+','+y;area1+=x+','+y;
      circles+='<circle cx="'+x+'" cy="'+y+'" r="4" fill="var(--accent)"/>';
      labels+='<text x="'+x+'" y="'+(y-7)+'" text-anchor="middle" font-size="7" fill="var(--accent)" font-family="DM Sans,sans-serif">'+filled[i].val+'</text>';
      labels+='<text x="'+x+'" y="'+(H+10)+'" text-anchor="middle" font-size="6" fill="var(--muted)" font-family="DM Sans,sans-serif">W'+filled[i].week+'</text>';
    }
    for(var i=filled.length-1;i>=0;i--){area2+=' '+((i/(filled.length-1))*W)+','+H;}
    chartEl.innerHTML='<svg viewBox="0 -10 '+W+' '+(H+16)+'" preserveAspectRatio="none">'
      +'<defs><linearGradient id="cg2" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="var(--accent)" stop-opacity=".25"/><stop offset="100%" stop-color="var(--accent)" stop-opacity="0"/></linearGradient></defs>'
      +'<polygon points="'+area1+area2+'" fill="url(#cg2)"/>'
      +'<polyline points="'+pts+'" fill="none" stroke="var(--accent)" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>'
      +circles+labels+'</svg>';
  }
  for(var i=filled.length-1;i>=0;i--){
    var prev=i<filled.length-1?filled[i+1]:null;
    var delta=prev?Math.round((filled[i].val-prev.val)*10)/10:null;
    var dh=delta!==null?'<span class="delta '+(delta>0?'up':delta<0?'dn':'eq')+'">'+(delta>0?'+':'')+delta+'kg</span>':'';
    logHtml+='<div class="prog-entry"><div><div class="pe-wk">'+filled[i].blockLabel+' · W'+filled[i].blockWk+'</div><div class="pe-val">'+filled[i].val+' kg</div></div>'+dh+'</div>';
  }
  document.getElementById('progGraphLog').innerHTML=logHtml;
}

// ── EDIT ──
function renderEditView(){
  var html='';
  for(var i=0;i<S.program.length;i++){
    var d=S.program[i];
    html+='<button class="edit-day-btn'+(d.day===S.editDay?' active':'')+'" onclick="setEditDay('+d.day+')">'+d.name+'</button>';
  }
  document.getElementById('editDayPicker').innerHTML=html;
  renderEditList();
}
function setEditDay(d){S.editDay=d;renderEditView();}
function renderEditList(){
  var dayData=null;
  for(var i=0;i<S.program.length;i++){if(S.program[i].day===S.editDay){dayData=S.program[i];break;}}
  var list=document.getElementById('editList');
  if(!dayData){list.innerHTML='';return;}
  if(dayData.rest){list.innerHTML='<div style="color:var(--muted);font-size:.82rem;padding:10px 0">Rest day — no exercises.</div>';return;}
  var html='';
  for(var i=0;i<dayData.exercises.length;i++){
    var ex=dayData.exercises[i];
    html+='<div class="edit-row"><div class="edit-top">'
      +'<input class="edit-inp" type="text" placeholder="Exercise name" value="'+ex.name+'" onchange="updEx('+S.editDay+',\''+ex.id+'\',\'name\',this.value)">'
      +'<select class="type-sel" onchange="updEx('+S.editDay+',\''+ex.id+'\',\'type\',this.value)">'
      +'<option value="main"'+(ex.type==='main'?' selected':'')+'>Primary</option>'
      +'<option value="secondary"'+(ex.type==='secondary'?' selected':'')+'>Secondary</option>'
      +'<option value="variation"'+(ex.type==='variation'?' selected':'')+'>Variation</option>'
      +'<option value="backoff"'+(ex.type==='backoff'?' selected':'')+'>Backoff</option>'
      +'<option value="accessory"'+(ex.type==='accessory'?' selected':'')+'>Accessory</option>'
      +'</select>'
      +'<button class="del-btn" onclick="delEx('+S.editDay+',\''+ex.id+'\')">&#10005;</button></div>'
      +'<input class="edit-inp" type="text" placeholder="Variation (optional)" value="'+(ex.v||'')+'" onchange="updEx('+S.editDay+',\''+ex.id+'\',\'v\',this.value)" style="font-size:.78rem;color:var(--sub)">'
      +'</div>';
  }
  list.innerHTML=html;
}
function updEx(dayNum,exId,field,val){
  for(var i=0;i<S.program.length;i++){
    if(S.program[i].day===dayNum){
      for(var j=0;j<S.program[i].exercises.length;j++){
        if(S.program[i].exercises[j].id===exId){S.program[i].exercises[j][field]=val;save();return;}
      }
    }
  }
}
function delEx(dayNum,exId){
  if(!confirm('Delete this exercise?'))return;
  for(var i=0;i<S.program.length;i++){
    if(S.program[i].day===dayNum){
      S.program[i].exercises=S.program[i].exercises.filter(function(e){return e.id!==exId;});break;
    }
  }
  save();renderEditList();
}
function addExercise(){
  var dayData=null;
  for(var i=0;i<S.program.length;i++){if(S.program[i].day===S.editDay){dayData=S.program[i];break;}}
  if(!dayData||dayData.rest)return;
  dayData.exercises.push({id:'d'+S.editDay+'e'+Date.now(),name:'',v:'',type:'accessory'});
  save();renderEditList();
}

// EXPORT / IMPORT
function exportData(){
  var blob=new Blob([JSON.stringify(S,null,2)],{type:'application/json'});
  var a=document.createElement('a');a.href=URL.createObjectURL(blob);
  a.download='meetprep_'+new Date().toISOString().slice(0,10)+'.json';
  a.click();toast('Exported');
}
function importData(event){
  var file=event.target.files[0];if(!file)return;
  var reader=new FileReader();
  reader.onload=function(e){
    try{var parsed=JSON.parse(e.target.result);
      S.maxes=parsed.maxes||S.maxes;S.logs=parsed.logs||{};S.doneDays=parsed.doneDays||{};
      S.week=parsed.week||1;S.day=parsed.day||1;
      if(parsed.program)S.program=parsed.program;
      save();renderAll();toast('Imported successfully');
    }catch(err){toast('Could not read file');}
  };
  reader.readAsText(file);event.target.value='';
}
function clearAllData(){
  if(!confirm('Clear all logged data? This cannot be undone.'))return;
  S.logs={};S.doneDays={};save();renderAll();toast('All logs cleared');
}

// ── INIT ──
function renderAll(){
  renderCountdown();renderMaxes();renderWeekBtns();renderDayTabs();renderDayContent();updateSwipeHints();
}
load();
renderAll();
</script>
